name: huinong_web
description: "AI农技推广平台"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # 核心网络与状态管理
  dio: ^5.4.0
  provider: ^6.1.1       # 修正：统一使用 Provider，移除 Riverpod
  
  # 模型与本地存储
  json_annotation: ^4.8.1
  shared_preferences: ^2.2.2
  
  # 农业项目核心功能
  cached_network_image: ^3.3.0
  image_picker: ^1.0.7   # 新增：用于调用摄像头识别病害
  flutter_tts: ^3.8.5    # 新增：适老化语音播报功能
  
  # 其他工具
  web_socket_channel: ^2.4.0
  url_launcher: ^6.2.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.6
  json_serializable: ^6.7.1